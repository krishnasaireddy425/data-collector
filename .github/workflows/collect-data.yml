name: Collect BTC 5m Price Data

# Self-chaining handles continuous operation. Cron is commented out
# because each scheduled run was getting auto-cancelled by GitHub's
# concurrency rule (cluttered the Actions tab with red ❌ runs).
# Uncomment the schedule block to bring it back as a safety net.
on:
  # schedule:
  #   - cron: '0 */6 * * *'   # every 6 hours: 00:00, 06:00, 12:00, 18:00 UTC
  # Allow manual runs from the GitHub UI
  workflow_dispatch:

# Prevent overlapping runs
concurrency:
  group: collect-data
  cancel-in-progress: false

# contents: write — to commit CSVs back
# actions: write  — to re-dispatch this workflow at the end (self-chaining)
permissions:
  contents: write
  actions: write

jobs:
  collect:
    runs-on: ubuntu-latest
    # 6 hour GitHub limit; we cap at 5h50m to leave time for git push
    timeout-minutes: 350

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Don't fail the whole job if collector crashes
      # so we still commit whatever was collected
      # PYTHONUNBUFFERED=1 -> live log streaming (no buffering)
      # SUPABASE_URL/KEY  -> paper trading decision logger
      - name: Run price collector (60 windows ~5 hours)
        continue-on-error: true
        env:
          PYTHONUNBUFFERED: "1"
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python -u -m price_collector.main --windows 60

      # Rebuild the viewer index so the GitHub Pages viewer stays in sync
      # with the freshly committed CSVs.
      - name: Rebuild viewer index
        if: always()
        run: |
          python3 viewer/build_index.py || true

      - name: Commit and push collected CSVs
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Pull any new commits made while we were running
          git pull --rebase origin main || true

          # Stage new CSVs and the rebuilt viewer index
          git add price_collector/data/*.csv 2>/dev/null || true
          git add viewer/index.json 2>/dev/null || true

          # Check if there's anything to commit
          if git diff --staged --quiet; then
            echo "No new CSVs to commit."
            exit 0
          fi

          # Count how many new CSVs
          NEW_COUNT=$(git diff --staged --name-only | grep -c "^price_collector/data/" || echo "0")
          DATE=$(date -u +"%Y-%m-%d %H:%M UTC")

          git commit -m "Collect data: $NEW_COUNT new windows ($DATE)"
          git push origin main

      # Self-chain: trigger the next run immediately after this one finishes.
      # if: !cancelled() means: trigger on success OR failure, but NOT on
      # user cancellation. This way `Cancel workflow` actually stops the
      # chain instead of immediately spawning another run.
      - name: Trigger next run
        if: ${{ !cancelled() }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run collect-data.yml --ref main
